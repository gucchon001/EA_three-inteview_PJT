{% extends "mock/base.html" %}
{% block title %}{{ page_title }}{% endblock %}
{% block content %}
<p class="muted">{{ role_label }} · import_errors</p>
<h1 class="display">{{ page_title }}</h1>
<div class="card" style="overflow-x:auto;">
  <table style="width:100%;border-collapse:collapse;">
    <thead>
      <tr>
        <th style="text-align:left;padding:0.5rem;">ジョブ</th>
        <th style="text-align:left;padding:0.5rem;">シート</th>
        <th style="text-align:left;padding:0.5rem;">行</th>
        <th style="text-align:left;padding:0.5rem;">メッセージ</th>
      </tr>
    </thead>
    <tbody>
      {% for r in rows %}
      <tr>
        <td style="padding:0.5rem;">{{ r.job }}</td>
        <td style="padding:0.5rem;">{{ r.sheet }}</td>
        <td style="padding:0.5rem;">{{ r.row }}</td>
        <td style="padding:0.5rem;">{{ r.msg }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
