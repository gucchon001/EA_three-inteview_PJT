{% extends "mock/base.html" %}
{% block title %}{{ page_title }}{% endblock %}
{% block body %}
<main style="max-width: 720px; margin: 2rem auto;">
  <p class="muted">{{ role_label }}</p>
  <h1 class="display">{{ page_title }}</h1>
  <div class="card">
    <p><strong>{{ teacher.name }}</strong>（{{ teacher.no }}）</p>
    <p class="muted">メール: {{ teacher.email }} / 状態: {{ teacher.status }}</p>
    <p><a href="/mock/teachers">← 一覧</a></p>
  </div>
</main>
{% endblock %}
