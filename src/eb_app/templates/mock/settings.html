{% extends "mock/base.html" %}
{% block title %}{{ page_title }}{% endblock %}
{% block content %}
<p class="muted">{{ role_label }}</p>
<h1 class="display">{{ page_title }}</h1>
<div class="card">
  <p class="muted">system_settings（閲覧スタブ）</p>
  <ul style="list-style:none;padding:0;margin:0;font-family:monospace;font-size:0.85rem;">
    {% for k, v in keys %}
    <li style="margin-bottom:0.5rem;"><strong>{{ k }}</strong> = {{ v }}</li>
    {% endfor %}
  </ul>
  <button type="button" class="btn btn-primary" style="margin-top:1rem;" disabled>保存（未接続）</button>
</div>
{% endblock %}
