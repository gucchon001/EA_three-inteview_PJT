{% extends "mock/base.html" %}
{% block title %}{{ page_title }}{% endblock %}
{% block content %}
<p class="muted">{{ role_label }}</p>
<h1 class="display">{{ page_title }}</h1>
<ul class="card" style="list-style:none;margin:0;padding:1rem;">
  {% for t in todos %}
  <li style="margin-bottom:0.75rem;">
    <strong>{{ t.title }}</strong>
    <span class="muted"> — 期限 {{ t.due }}（{{ t.status }}）</span>
  </li>
  {% endfor %}
</ul>
{% endblock %}
