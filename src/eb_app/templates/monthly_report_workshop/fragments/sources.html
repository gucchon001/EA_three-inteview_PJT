<div class="space-y-2">
  {% if sources %}
  <div class="overflow-x-auto">
    <table class="table table-xs">
      <thead>
        <tr>
          <th>source</th>
          <th>type</th>
          <th>hash</th>
          <th>snapshot</th>
        </tr>
      </thead>
      <tbody>
    {% for source in sources %}
        <tr>
          <td class="font-semibold">{{ source.display_name }}</td>
          <td><span class="badge badge-sm badge-outline">{{ source.source_type }}</span></td>
          <td><code>{{ source.content_hash }}</code></td>
          <td>
            {% if source.snapshot_text %}
            <pre class="max-h-44 overflow-auto whitespace-pre-wrap rounded bg-base-200 p-2 text-xs">{{ source.snapshot_text }}</pre>
            {% endif %}
          </td>
        </tr>
    {% endfor %}
      </tbody>
    </table>
  </div>
  {% else %}
  <div role="alert" class="alert rounded-md py-3 text-sm">
    <span>保存済みソースはまだありません。</span>
  </div>
  {% endif %}
</div>
