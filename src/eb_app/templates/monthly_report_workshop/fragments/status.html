<div class="space-y-3">
  <p class="text-sm text-base-content/70">
    status: <span class="badge badge-sm badge-neutral">{{ job.status }}</span>
    <span class="mx-1">·</span>
    current stage: <strong>{{ job.current_stage or "-" }}</strong>
  </p>
  <div class="overflow-x-auto">
    <table class="table table-xs table-zebra">
      <thead>
        <tr>
          <th>stage</th>
          <th>id</th>
          <th>state</th>
          <th>duration</th>
        </tr>
      </thead>
      <tbody>
        {% for stage in job.stages %}
        <tr>
          <td class="font-semibold">{{ stage.label }}</td>
          <td><code>{{ stage.id }}</code></td>
          <td>
            <span class="badge badge-sm {% if stage.state == 'running' %}badge-info{% elif stage.state == 'done' %}badge-success{% else %}badge-ghost{% endif %}">
              {{ stage.state }}
            </span>
          </td>
          <td>{{ stage.duration }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
