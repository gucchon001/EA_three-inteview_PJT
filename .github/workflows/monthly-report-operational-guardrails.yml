name: Monthly Report Operational Guardrails

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      run_cloud_run_smoke:
        description: "Run Cloud Run smoke check using repository secrets"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  migration-static-rls:
    name: Migration, static schema, and RLS checks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      EB_AUTH_MODE: mock
      EB_ENV: test
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-app.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-app.txt

      - name: Static migration guardrails
        shell: bash
        run: |
          test -d supabase/migrations
          test -n "$(find supabase/migrations -name '*.sql' -print -quit)"
          ! grep -RniE 'drop[[:space:]]+(schema|table)|disable[[:space:]]+row[[:space:]]+level[[:space:]]+security' supabase/migrations
          grep -Rni 'enable row level security' supabase/migrations
          grep -Rni 'create policy' supabase/migrations

      - name: Run static schema and safety focused tests
        run: |
          pytest \
            tests/test_monthly_report_schema_files.py \
            tests/test_monthly_report_pii_safety.py \
            tests/test_monthly_report_cloud_logging.py \
            tests/test_monthly_report_html_ui.py \
            tests/test_monthly_report_worker.py \
            tests/test_monthly_report_worker_entry.py \
            -q

  cloud-run-smoke:
    name: Cloud Run smoke check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'workflow_dispatch' && inputs.run_cloud_run_smoke == 'true'

    env:
      CLOUD_RUN_SMOKE_URL: ${{ secrets.CLOUD_RUN_SMOKE_URL }}
      CLOUD_RUN_SMOKE_BEARER_TOKEN: ${{ secrets.CLOUD_RUN_SMOKE_BEARER_TOKEN }}

    steps:
      - name: Validate smoke configuration
        shell: bash
        run: |
          if [ -z "${CLOUD_RUN_SMOKE_URL}" ]; then
            echo "CLOUD_RUN_SMOKE_URL repository secret is required when run_cloud_run_smoke=true."
            exit 1
          fi

      - name: Check Cloud Run endpoint
        shell: bash
        run: |
          set -euo pipefail
          args=(-fsS -o /dev/null -w "%{http_code}" --max-time 20)
          if [ -n "${CLOUD_RUN_SMOKE_BEARER_TOKEN}" ]; then
            args+=(-H "Authorization: Bearer ${CLOUD_RUN_SMOKE_BEARER_TOKEN}")
          fi
          status="$(curl "${args[@]}" "${CLOUD_RUN_SMOKE_URL}")"
          case "${status}" in
            2*|3*) echo "Cloud Run smoke returned HTTP ${status}" ;;
            *) echo "Cloud Run smoke returned HTTP ${status}"; exit 1 ;;
          esac
